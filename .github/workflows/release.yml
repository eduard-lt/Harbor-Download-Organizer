name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================================
  # Quality Gates - Run tests before releasing
  # ============================================================================
  quality-check:
    name: Pre-Release Quality Check
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: packages/ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('packages/ui/package-lock.json') }}

      - name: Install Frontend Dependencies
        working-directory: packages/ui
        run: npm install

      - name: Build Frontend
        working-directory: packages/ui
        run: npm run build

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run frontend tests
        working-directory: packages/ui
        run: npm run test -- --run

      - name: Run Rust tests
        run: cargo test --all --all-features --verbose

  # ============================================================================
  # Build and Release - Only after quality checks pass
  # ============================================================================
  build-windows:
    name: Build & Release
    runs-on: windows-latest
    needs: [quality-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: packages/ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('packages/ui/package-lock.json') }}

      - name: Install Frontend Dependencies
        working-directory: packages/ui
        run: npm install

      - name: Build Frontend
        working-directory: packages/ui
        run: npm run build

      - name: Build Tauri App (MSI)
        working-directory: packages/ui
        run: npm run tauri:build

      - name: Prepare Release Artifacts
        run: |
            New-Item -ItemType Directory -Force -Path dist
            Copy-Item target\release\bundle\msi\*.msi dist\
      
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.msi
          fail_on_unmatched_files: true
