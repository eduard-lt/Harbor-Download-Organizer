name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Build frontend once — shared by all downstream jobs
  # ============================================================================
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/cache@v6
        with:
          path: packages/ui/node_modules
          key: node-${{ hashFiles('packages/ui/package-lock.json') }}
      - run: npm install
        working-directory: packages/ui
      - run: npm run build
        working-directory: packages/ui
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: packages/ui/dist
          retention-days: 1

  # ============================================================================
  # Quality checks run in parallel (all need frontend dist)
  # ============================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: windows-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: packages/ui/dist
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/cache@v6
        with:
          path: packages/ui/node_modules
          key: node-${{ hashFiles('packages/ui/package-lock.json') }}
      - run: npm install
        working-directory: packages/ui
      - run: npm run test -- --run
        working-directory: packages/ui

  test-rust:
    name: Rust Tests
    runs-on: windows-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: packages/ui/dist
      - run: cargo test --all --all-features --verbose

  # ============================================================================
  # Build Windows
  # ============================================================================
  build-windows:
    name: Build Windows (MSI)
    runs-on: windows-latest
    needs: [format, clippy, test-frontend, test-rust]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/cache@v6
        with:
          path: packages/ui/node_modules
          key: node-${{ hashFiles('packages/ui/package-lock.json') }}
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: packages/ui/dist

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Install frontend deps
        working-directory: packages/ui
        run: npm install

      - name: Build Tauri App (MSI)
        working-directory: packages/ui
        run: npm run tauri:build

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\bundle\msi\*.msi dist\

      - uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: dist/
          retention-days: 1

  # ============================================================================
  # Build macOS
  # ============================================================================
  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    needs: [format, clippy, test-frontend, test-rust]
    env:
      TAURI_BUNDLER_DMG_IGNORE_CI: 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/cache@v6
        with:
          path: packages/ui/node_modules
          key: node-${{ hashFiles('packages/ui/package-lock.json') }}
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: packages/ui/dist

      - name: Install frontend deps
        working-directory: packages/ui
        run: npm install

      - name: Generate DMG background
        run: swift tools/generate_dmg_background.swift crates/tauri-app/dmg_background.png

      - name: Build Tauri App (DMG)
        working-directory: packages/ui
        run: npm run tauri:build

      - name: Ad-hoc sign and unquarantine
        run: |
          APP="target/release/bundle/macos/Harbor.app"
          if [ -d "$APP" ]; then
            codesign --force --deep --sign - "$APP"
            xattr -cr "$APP"
            echo "App ad-hoc signed and unquarantined"
          fi

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp target/release/bundle/dmg/*.dmg dist/

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: dist/
          retention-days: 1

  # ============================================================================
  # GitHub Release
  # ============================================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: windows-msi
          path: dist/
      - uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: dist/
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.msi
            dist/*.dmg
          fail_on_unmatched_files: true
