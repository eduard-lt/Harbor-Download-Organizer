name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================================
  # Quality Gates - Run tests before releasing
  # ============================================================================
  quality-check:
    name: Pre-Release Quality Check
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: packages/ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('packages/ui/package-lock.json') }}

      - name: Install Frontend Dependencies
        working-directory: packages/ui
        run: npm install

      - name: Build Frontend
        working-directory: packages/ui
        run: npm run build

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run frontend tests
        working-directory: packages/ui
        run: npm run test -- --run

      - name: Run Rust tests
        run: cargo test --all --all-features --verbose

  # ============================================================================
  # Build Windows - Only after quality checks pass
  # ============================================================================
  build-windows:
    name: Build Windows (MSI)
    runs-on: windows-latest
    needs: [quality-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: packages/ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('packages/ui/package-lock.json') }}

      - name: Install Frontend Dependencies
        working-directory: packages/ui
        run: npm install

      - name: Build Frontend
        working-directory: packages/ui
        run: npm run build

      - name: Build Tauri App (MSI)
        working-directory: packages/ui
        run: npm run tauri:build

      - name: Prepare Release Artifacts
        run: |
            New-Item -ItemType Directory -Force -Path dist
            Copy-Item target\release\bundle\msi\*.msi dist\
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/
          retention-days: 1

  # ============================================================================
  # Build macOS - Only after quality checks pass
  # ============================================================================
  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    needs: [quality-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: packages/ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('packages/ui/package-lock.json') }}

      - name: Install Frontend Dependencies
        working-directory: packages/ui
        run: npm install

      - name: Build Frontend
        working-directory: packages/ui
        run: npm run build

      - name: Generate DMG background
        run: |
          swift tools/generate_dmg_background.swift crates/tauri-app/dmg_background.png

      - name: Build Tauri App (DMG)
        working-directory: packages/ui
        run: npm run tauri:build

      - name: Ad-hoc sign and unquarantine app
        run: |
          APP="target/release/bundle/macos/Harbor.app"
          if [ -d "$APP" ]; then
            codesign --force --deep --sign - "$APP"
            xattr -cr "$APP"
            echo "App ad-hoc signed and unquarantined"
          else
            echo "App bundle not found at $APP"
            ls -R target/release/bundle/ || true
          fi

      - name: Prepare Release Artifacts
        run: |
          mkdir -p dist
          cp target/release/bundle/dmg/*.dmg dist/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/
          retention-days: 1

  # ============================================================================
  # GitHub Release - Combine artifacts from both platforms
  # ============================================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.msi
            dist/*.dmg
          fail_on_unmatched_files: true
