name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Format Check
  # ============================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ============================================================================
  # Build Frontend once — shared by downstream jobs
  # ============================================================================
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        with:
          path: packages/ui/node_modules
          key: node-${{ hashFiles('packages/ui/package-lock.json') }}
      - run: npm install
        working-directory: packages/ui
      - run: npm run build
        working-directory: packages/ui
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/ui/dist
          retention-days: 1

  # ============================================================================
  # Quality checks run in parallel
  # ============================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/ui/dist
      - run: cargo clippy --all-targets --all-features -- -D warnings

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        with:
          path: packages/ui/node_modules
          key: node-${{ hashFiles('packages/ui/package-lock.json') }}
      - run: npm install
        working-directory: packages/ui
      - run: npm run test -- --run
        working-directory: packages/ui

  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/ui/dist
      - run: cargo test --all --all-features --verbose

  # ============================================================================
  # Release build (Windows target)
  # ============================================================================
  build:
    name: Release Build (Windows)
    runs-on: windows-latest
    needs: [clippy, frontend-test, test]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/ui/dist
      - run: cargo build --all --release --verbose
      - name: Check binary sizes
        run: |
          if (Test-Path target/release/harbor-cli.exe) {
            $size = (Get-Item target/release/harbor-cli.exe).Length / 1MB
            Write-Host "✓ harbor-cli.exe: $([math]::Round($size, 2)) MB"
          }
          if (Test-Path target/release/harbor-tray.exe) {
            $size = (Get-Item target/release/harbor-tray.exe).Length / 1MB
            Write-Host "✓ harbor-tray.exe: $([math]::Round($size, 2)) MB"
          }

  # ============================================================================
  # Security Audit
  # ============================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [clippy, frontend-test, test]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit

  # ============================================================================
  # macOS compilation check
  # ============================================================================
  macos-check:
    name: macOS Check
    runs-on: macos-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/ui/dist
      - run: cargo check --workspace
      - run: cargo test --workspace

  # ============================================================================
  # Final gate
  # ============================================================================
  ci-success:
    name: CI Success
    needs: [format, frontend-build, clippy, frontend-test, test, build, audit, macos-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          FAILED=""
          [ "${{ needs.format.result }}" != "success" ] && FAILED="$FAILED format"
          [ "${{ needs.frontend-build.result }}" != "success" ] && FAILED="$FAILED frontend-build"
          [ "${{ needs.clippy.result }}" != "success" ] && FAILED="$FAILED clippy"
          [ "${{ needs.frontend-test.result }}" != "success" ] && FAILED="$FAILED frontend-test"
          [ "${{ needs.test.result }}" != "success" ] && FAILED="$FAILED test"
          [ "${{ needs.build.result }}" != "success" ] && FAILED="$FAILED build"
          [ "${{ needs.audit.result }}" != "success" ] && FAILED="$FAILED audit"
          [ "${{ needs.macos-check.result }}" != "success" ] && FAILED="$FAILED macos-check"
          if [ -n "$FAILED" ]; then
            echo "❌ Failed jobs:$FAILED"
            exit 1
          fi
          echo "✅ All CI checks passed!"