# git-cliff configuration for Harbor changelog generation
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog

All notable changes to Harbor are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else -%}
## [Unreleased]
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{%- for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% endfor %}
{% endfor %}
"""
# Keep the existing footer with comparison links at the bottom
footer = """
{% for release in releases -%}
{%- if release.version -%}
{%- if release.previous and release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/eduard-lt/Harbor-Download-Organizer/compare/{{ release.previous.version }}...{{ release.version }}
{%- endif -%}
{%- endif -%}
{% endfor %}
{% if releases | last -%}
{%- if releases | last | get(key="previous") and releases | last | get(key="previous") | get(key="version") -%}
[Unreleased]: https://github.com/eduard-lt/Harbor-Download-Organizer/compare/{{ releases | last | get(key="previous") | get(key="version") }}...HEAD
{%- endif -%}
{% endif %}
"""
trim = false

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^style", group = "Changed" },
  { message = "^test", group = "Changed" },
  { message = "^chore", group = "Changed" },
  { message = "^ci", group = "Changed" },
  { message = "^docs", group = "Changed" },
  { message = "^build", group = "Changed" },
  { message = "^revert", group = "Changed" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/eduard-lt/Harbor-Download-Organizer/issues/$1" },
]
